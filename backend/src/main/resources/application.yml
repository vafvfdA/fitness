spring:
  application:
    name: fitness-backend
  datasource:
    url: ${FITNESS_DATASOURCE_URL:jdbc:mysql://localhost:3307/fitness?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${FITNESS_DATASOURCE_USERNAME:fitness}
    password: ${FITNESS_DATASOURCE_PASSWORD:fitness}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
